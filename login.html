<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Sign Up - WithMore Gifts</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-logo">
        <a href="index.html">
          <img src="images/logo.jpeg" alt="WithMore Gifts" />
        </a>
      </div>

      <div class="navbar-brand">WithMore Gifts</div>

      <div class="nav-right">
        <div class="nav-links nav-center">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>

        <div class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

          </svg>
        </div>
        <a href="account.html" class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

          </svg>
        </a>
        <a href="cart.html" class="nav-icon" style="position: relative">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />

          </svg>

        </a>
        <button class="hamburger-btn">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main style="padding: 3rem 0; min-height: 70vh">
      <div class="container" style="max-width: 500px">
        <h1 style="text-align: center; margin-bottom: 2rem">Welcome</h1>

        <!-- TABS -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="signup">Sign Up</button>
        </div>

        <!-- LOGIN TAB -->
        <div class="tab-content active" data-tab="login">
          <div style="padding: 2rem 0">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" placeholder="Enter your email" />
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" placeholder="Enter your password" />
            </div>
            <button class="btn btn-primary btn-block" id="login-btn" style="margin-top: 2rem">Login</button>
            <!-- Status message -->
            <div id="login-msg" style="margin-top:1rem; text-align:center; color: var(--accent-primary); display:none;"></div>
          </div>
        </div>

        <!-- SIGNUP TAB -->
        <div class="tab-content" data-tab="signup">
          <div style="padding: 2rem 0">
            <div class="form-group">
              <label for="signup-name">Full Name</label>
              <input type="text" id="signup-name" placeholder="Enter your full name" />
            </div>
            <div class="form-group">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" placeholder="Enter your email" />
            </div>
            <div class="form-group">
              <label for="signup-phone">Phone Number</label>
              <input type="tel" id="signup-phone" placeholder="Enter your phone number" />
            </div>
            <div class="form-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" placeholder="Create a password (min 6 characters)" />
            </div>
            <button class="btn btn-primary btn-block" id="signup-btn" style="margin-top: 2rem">Sign Up</button>
            <!-- Status message -->
            <div id="signup-msg" style="margin-top:1rem; text-align:center; color: var(--accent-primary); display:none;"></div>
          </div>
        </div>

      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-column footer-logo">
            <img src="images/logo.jpeg" alt="WithMore Gifts" />
            <p class="footer-tagline">Accessories for every moment</p>
          </div>
          <div class="footer-column">
            <h4>Quick Links</h4>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="faq.html">FAQ</a>
          </div>
          <div class="footer-column">
            <h4>Account</h4>
            <a href="login.html">Login</a>
            <a href="orders.html">My Orders</a>
          </div>
          <div class="footer-column">
            <h4>Policy</h4>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms & Conditions</a>
          </div>
        </div>
        <div class="footer-bottom">
          © 2026 WithMore Gifts. All rights reserved.
        </div>
      </div>
    </footer>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/script.js"></script>

    <script>
      // ============================================
      // REAL LOGIN WITH SUPABASE AUTH
      // ============================================

      const SUPABASE_URL = 'https://rjjruxjuayqgefhelloz.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_9pZjdtNSoPdewyZNJ2FfyA_iRsSgHNs';
      const { createClient } = supabase;
      const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

      // Show message helper
      function showMsg(id, text, isError = false) {
        const el = document.getElementById(id);
        el.style.display = 'block';
        el.style.color = isError ? 'red' : 'var(--accent-primary)';
        el.textContent = text;
      }

      // ── SIGN UP ──
      document.getElementById('signup-btn').addEventListener('click', async () => {
        const name     = document.getElementById('signup-name').value.trim();
        const email    = document.getElementById('signup-email').value.trim();
        const phone    = document.getElementById('signup-phone').value.trim();
        const password = document.getElementById('signup-password').value.trim();

        if (!name || !email || !phone || !password) {
          showMsg('signup-msg', 'Please fill in all fields!', true);
          return;
        }
        if (password.length < 6) {
          showMsg('signup-msg', 'Password must be at least 6 characters!', true);
          return;
        }

        showMsg('signup-msg', 'Creating your account...');

        // Create real Supabase Auth account
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            data: { name, phone },
            emailRedirectTo: 'https://sruthiranjani.github.io/website/orders.html'
          }
        });

        if (error) {
          showMsg('signup-msg', error.message, true);
          return;
        }

        // Also save to users table
        await supabaseClient.from('users').insert([{ name, email, phone }]);

        // Save to localStorage
        saveUser({ name, email, phone });

        showMsg('signup-msg', '✅ Account created! Please check your email to verify your account.');
      });

      // ── LOGIN ──
      document.getElementById('login-btn').addEventListener('click', async () => {
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value.trim();

        if (!email || !password) {
          showMsg('login-msg', 'Please enter email and password!', true);
          return;
        }

        showMsg('login-msg', 'Logging in...');

        // Real Supabase Auth login
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          showMsg('login-msg', '❌ ' + error.message, true);
          return;
        }

        // Get user details
        const user = data.user;
        const name = user.user_metadata?.name || email.split('@')[0];
        const phone = user.user_metadata?.phone || '';

        // Save to localStorage
        saveUser({ name, email, phone });

        showMsg('login-msg', `✅ Welcome back, ${name}! Redirecting...`);
        setTimeout(() => {
          window.location.href = 'orders.html';
        }, 1500);
      });

      // Initialize tabs and cart badge
      document.addEventListener('DOMContentLoaded', () => {
        initTabs();
        updateCartBadge();
        toggleHamburgerMenu();
      });
    </script>

  </body>
</html>
