<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - WithMore Gifts</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-logo">
        <a href="index.html">
          <img src="images/logo.jpeg" alt="WithMore Gifts" />
        </a>
      </div>

      <div class="navbar-brand">WithMore Gifts</div>

      <div class="nav-right">
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>

        <div class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor" />
          </svg>
        </div>
        <a href="login.html" class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" />
          </svg>
        </a>
        <a href="cart.html" class="nav-icon" style="position: relative">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
          <div class="cart-badge">0</div>
        </a>
        <button class="hamburger-btn">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main style="padding: 3rem 0; min-height: 70vh">
      <div class="container">
        <h1 style="margin-bottom: 2rem">Checkout</h1>

        <div class="checkout-container">
          <!-- ORDER SUMMARY -->
          <div class="checkout-section">
            <h3>Order Summary</h3>
            <div class="order-summary" style="border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; background: var(--bg-card)"></div>
          </div>

          <!-- DELIVERY FORM -->
          <div class="checkout-section">
            <h3>Delivery Information</h3>
            <form>
              <div class="form-group">
                <label for="fullname">Full Name *</label>
                <input type="text" id="fullname" placeholder="Enter your full name" />
                <div class="error-message"></div>
              </div>

              <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" />
                <div class="error-message"></div>
              </div>

              <div class="form-group">
                <label for="street">Street Address *</label>
                <input type="text" id="street" placeholder="Enter your street address" />
                <div class="error-message"></div>
              </div>

              <div class="form-group">
                <label for="city">City *</label>
                <input type="text" id="city" placeholder="Enter your city" />
                <div class="error-message"></div>
              </div>

              <div class="form-group">
                <label for="pincode">Pincode *</label>
                <input type="text" id="pincode" placeholder="Enter your pincode" />
                <div class="error-message"></div>
              </div>

              <button type="button" class="btn btn-primary btn-block place-order-btn" style="margin-top: 2rem">Place Order</button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-column footer-logo">
            <img src="images/logo.jpeg" alt="WithMore Gifts" />
            <p class="footer-tagline">Accessories for every moment</p>
          </div>

          <div class="footer-column">
            <h4>Quick Links</h4>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="faq.html">FAQ</a>
          </div>

          <div class="footer-column">
            <h4>Account</h4>
            <a href="login.html">Login</a>
            <a href="orders.html">My Orders</a>
          </div>

          <div class="footer-column">
            <h4>Policy</h4>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms & Conditions</a>
          </div>
        </div>

        <div class="footer-bottom">
          © 2026 WithMore Gifts. All rights reserved.
        </div>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/script.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        renderCheckoutSummary();
        handleCheckoutSubmit();
      });
    </script>
   
  </body>
</html>
